<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Login & Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <h2 class="section-title mb-4 text-center">Welcome Back to 🐾 PawTrace</h2>
      <div class="row g-4 justify-content-center">
        <div class="col-lg-5">
          <div class="card soft-card p-4 bg-white">
            <h4 class="text-primary mb-3">Login</h4>
            <form id="loginForm">
              <div class="mb-3">
                <label for="loginEmail" class="form-label">Email</label>
                <input id="loginEmail" type="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="loginPassword" class="form-label">Password</label>
                <input id="loginPassword" type="password" class="form-control" required />
              </div>
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe" />
                  <label class="form-check-label" for="rememberMe">Remember me</label>
                </div>
                <a href="#" class="small text-primary">Forgot password?</a>
              </div>
              <button class="btn btn-blue w-100" type="submit">Login</button>
            </form>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="card soft-card p-4 bg-white">
            <h4 class="text-primary mb-3">Signup</h4>
            <form id="signupForm">
              <div class="mb-3">
                <label for="signupName" class="form-label">Full Name</label>
                <input id="signupName" type="text" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="signupEmail" class="form-label">Email</label>
                <input id="signupEmail" type="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="signupPassword" class="form-label">Password</label>
                <input id="signupPassword" type="password" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="signupConfirm" class="form-label">Confirm Password</label>
                <input id="signupConfirm" type="password" class="form-control" required />
              </div>
              <button class="btn btn-blue w-100" type="submit">Create Account</button>
            </form>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
