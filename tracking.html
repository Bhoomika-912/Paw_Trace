<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Live Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <h2 class="section-title mb-4">Live Tracking</h2>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="soft-card overflow-hidden bg-white">
            <iframe
              title="Map placeholder"
              src="https://maps.google.com/maps?q=central%20park%20new%20york&t=&z=13&ie=UTF8&iwloc=&output=embed"
              width="100%"
              height="400"
              style="border: 0;"
              loading="lazy"
            ></iframe>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="soft-card bg-white p-4 h-100">
            <h5 class="text-primary">Tracking Details</h5>
            <p class="mb-2"><strong>Last Seen:</strong> Central Park, NY</p>
            <p class="mb-3"><strong>Status:</strong> <span id="trackingStatus" class="status-pill status-searching">Searching</span></p>
            <div class="timeline mb-3">
              <div class="timeline-item">
                <h6 class="mb-0">Report Submitted</h6>
                <small class="text-muted">Mar 22, 2026 - 09:10 AM</small>
              </div>
              <div class="timeline-item">
                <h6 class="mb-0">Nearby Alerts Sent</h6>
                <small class="text-muted">Mar 22, 2026 - 09:25 AM</small>
              </div>
              <div class="timeline-item">
                <h6 class="mb-0">New Sighting Received</h6>
                <small class="text-muted">Mar 23, 2026 - 11:45 AM</small>
              </div>
            </div>
            <button id="reportSightingBtn" class="btn btn-blue"><i class="bi bi-eye-fill"></i> Report Sighting</button>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
