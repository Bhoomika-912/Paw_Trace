<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Report Missing Pet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <div class="soft-card bg-white p-4 p-md-5 fade-in">
        <h2 class="section-title mb-4">Report Missing Pet</h2>
        <form id="reportForm" class="row g-3">
          <div class="col-md-6">
            <label for="petName" class="form-label">Pet Name *</label>
            <input id="petName" type="text" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label for="animalType" class="form-label">Animal Type *</label>
            <input id="animalType" type="text" class="form-control" placeholder="Dog, Cat, Bird..." required />
          </div>
          <div class="col-md-6">
            <label for="breed" class="form-label">Breed</label>
            <input id="breed" type="text" class="form-control" />
          </div>
          <div class="col-md-6">
            <label for="color" class="form-label">Color</label>
            <input id="color" type="text" class="form-control" />
          </div>
          <div class="col-md-6">
            <label for="location" class="form-label">Last Seen Location *</label>
            <input id="location" type="text" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label for="dateMissing" class="form-label">Date Missing *</label>
            <input id="dateMissing" type="date" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label for="petImage" class="form-label">Upload Image</label>
            <input id="petImage" type="file" accept="image/*" class="form-control" />
          </div>
          <div class="col-md-6">
            <label for="ownerContact" class="form-label">Owner Contact *</label>
            <input id="ownerContact" type="text" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label for="reward" class="form-label">Reward Amount</label>
            <input id="reward" type="number" class="form-control" placeholder="0" />
          </div>
          <div class="col-12">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" rows="4" class="form-control" placeholder="Special marks, behavior, accessories, etc."></textarea>
          </div>
          <div class="col-12">
            <button class="btn btn-blue" type="submit"><i class="bi bi-send"></i> Submit Report</button>
          </div>
        </form>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
