<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <h2 class="section-title mb-4">Share Your Feedback</h2>
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="soft-card bg-white p-4">
            <form id="feedbackForm">
              <label class="form-label">Rate your experience</label>
              <div class="mb-3">
                <i class="bi bi-star-fill rating-star" data-value="1"></i>
                <i class="bi bi-star-fill rating-star" data-value="2"></i>
                <i class="bi bi-star-fill rating-star" data-value="3"></i>
                <i class="bi bi-star-fill rating-star" data-value="4"></i>
                <i class="bi bi-star-fill rating-star" data-value="5"></i>
                <input type="hidden" id="ratingValue" />
              </div>
              <div class="mb-3">
                <label class="form-label">Your Feedback</label>
                <textarea class="form-control" rows="5" required></textarea>
              </div>
              <button class="btn btn-blue" type="submit">Submit Feedback</button>
            </form>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="soft-card bg-white p-4 h-100">
            <h5 class="text-primary">Testimonials</h5>
            <div class="mb-3">
              <p class="mb-1">"Simple interface and quick alerts helped find our cat."</p>
              <small class="text-muted">- Priya S.</small>
            </div>
            <div class="mb-3">
              <p class="mb-1">"Love the tracking timeline and responsive design."</p>
              <small class="text-muted">- Daniel K.</small>
            </div>
            <div>
              <p class="mb-1">"Very useful for local rescue volunteers."</p>
              <small class="text-muted">- Animal Care Team</small>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
