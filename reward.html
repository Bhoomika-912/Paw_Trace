<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <h2 class="section-title mb-4">Reward Listings</h2>
      <div class="row g-4">
        <div class="col-lg-7">
          <div class="soft-card bg-white p-4">
            <h5 class="text-primary mb-3">Pets with Rewards</h5>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Pet Name</th>
                    <th>Type</th>
                    <th>Location</th>
                    <th>Reward</th>
                  </tr>
                </thead>
                <tbody id="rewardList"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="col-lg-5">
          <div class="soft-card bg-white p-4 mb-4">
            <h5 class="text-primary">Claim Reward</h5>
            <form id="claimForm">
              <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Pet Name</label>
                <input class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Proof Details</label>
                <textarea class="form-control" rows="3" required></textarea>
              </div>
              <button class="btn btn-blue" type="submit">Submit Claim</button>
            </form>
          </div>
          <div class="soft-card bg-white p-4">
            <h5 class="text-primary">Success Stories</h5>
            <p class="text-muted small mb-2">"Milo returned home in 2 days thanks to local alerts!"</p>
            <p class="text-muted small mb-2">"A neighborhood volunteer helped us find Bella quickly."</p>
            <p class="text-muted small mb-0">"Reward listing made people act fast with accurate sightings."</p>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
