<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Contact</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <h2 class="section-title mb-4">Contact Us</h2>
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="soft-card bg-white p-4">
            <form id="contactForm">
              <div class="mb-3">
                <label class="form-label" for="contactName">Name</label>
                <input id="contactName" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label" for="contactEmail">Email</label>
                <input id="contactEmail" type="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label" for="contactMessage">Message</label>
                <textarea id="contactMessage" rows="4" class="form-control" required></textarea>
              </div>
              <button class="btn btn-blue" type="submit">Send Message</button>
            </form>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="soft-card bg-white p-4 mb-3">
            <h5 class="text-primary">Reach Us</h5>
            <p class="mb-1"><i class="bi bi-telephone-fill text-primary"></i> +1 555 120 8080</p>
            <p class="mb-1"><i class="bi bi-envelope-fill text-primary"></i> help@missingpetsfinder.com</p>
            <p class="mb-0"><i class="bi bi-geo-alt-fill text-primary"></i> 23 Pet Care Avenue, New York, USA</p>
            <div class="mt-3">
              <a class="social-icon" href="#"><i class="bi bi-facebook"></i></a>
              <a class="social-icon" href="#"><i class="bi bi-instagram"></i></a>
              <a class="social-icon" href="#"><i class="bi bi-twitter-x"></i></a>
            </div>
          </div>
          <div class="soft-card overflow-hidden">
            <iframe
              title="Office location"
              src="https://maps.google.com/maps?q=times%20square%20new%20york&t=&z=13&ie=UTF8&iwloc=&output=embed"
              width="100%"
              height="270"
              style="border:0"
              loading="lazy"
            ></iframe>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
