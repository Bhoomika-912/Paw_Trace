<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐾 PawTrace | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <main class="main-content container py-4">
      <section class="hero fade-in">
        <div class="row g-4 align-items-center">
          <div class="col-lg-6">
            <h1 class="display-5 fw-bold text-primary">🐾 PawTrace</h1>
            <p class="lead text-muted">A caring community platform to report, search, and reunite pets with their families quickly.</p>
            <div class="d-flex flex-wrap gap-2">
              <a href="report.html" class="btn btn-blue">Report Missing Pet</a>
              <a href="alerts.html" class="btn btn-outline-primary rounded-pill px-4">View Alerts</a>
            </div>
          </div>
          <div class="col-lg-6">
            <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=1200&q=80" alt="Pet hero image" class="img-fluid w-100" />
          </div>
        </div>
      </section>

      <section class="mb-4">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 search-pill"><i class="bi bi-search text-primary"></i></span>
          <input id="homeSearch" type="text" class="form-control border-start-0 search-pill" placeholder="Search by pet name, type, breed, or location" />
        </div>
      </section>

      <section class="mb-5">
        <h3 class="section-title mb-3">Featured Missing Pets</h3>
        <div id="homePetCards" class="row g-4"></div>
      </section>

      <section class="mb-3">
        <h3 class="section-title mb-3">Pet Gallery</h3>
        <div id="petSlider" class="carousel slide soft-card overflow-hidden" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="dog.jpg" class="d-block w-100" alt="Dog" style="height: 400px; object-fit: cover;" />
            </div>
            <div class="carousel-item">
              <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=1400&q=80" class="d-block w-100" alt="Cat" style="height: 400px; object-fit: cover;" />
            </div>
            <div class="carousel-item">
              <img src="https://images.unsplash.com/photo-1552728089-57bdde30beb3?auto=format&fit=crop&w=1400&q=80" class="d-block w-100" alt="Parrot" style="height: 400px; object-fit: cover;" />
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#petSlider" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#petSlider" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
          </button>
        </div>
      </section>
    </main>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
